<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ZYNERGY - Built because Notes app wasn't enough.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="chatbot-widget.css">
  <!-- Chart.js CDN for premium charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Confetti CDN for achievements -->

<body>
  <!-- 1. BRUTALIST LANDING PAGE (Visible when logged out) -->
  <div id="landing-container" class="landing-container">

    <!-- Sticky Glassmorphic Navbar -->
    <nav class="landing-nav">
      <div class="landing-nav-content">
        <h2 class="brand">ZYNERGY</h2>
        <div class="landing-nav-actions">
          <button type="button" onclick="loginpage()" class="ux-primary-cta">Sign In</button>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="landing-hero">
      <div class="hero-content">
        <h1 class="hero-title">ZYNERGY</h1>
        <p class="hero-subtitle">
          Gym. Food. Sleep.<br>
          One place.<br>
          No motivational quotes.
        </p>
        <div class="hero-ctas">
          <button type="button" onclick="loginpage()" class="ux-primary-cta">Let's Lift →</button>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="landing-footer">
      <div class="footer-top">
        <h2 class="brand">ZYNERGY</h2>
        <p>Built because the Notes app wasn't enough.</p>
      </div>
      <p class="copyright">&copy; 2026 ZYNERGY. Built for builders.</p>
    </footer>
  </div>



  <script type="module" src="script.js"></script>
  <script type="module" src="chatbot-widget.js"></script>
</body>

</html>
