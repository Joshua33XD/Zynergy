<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ZYNERGY Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="chatbot-widget.css">
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h2 class="brand">ZYNERGY</h2>
      <nav class="side-nav">
        <ul>
          <li><a href="index.html" aria-current="page">Dashboard</a></li>
          <li><a href="workouts.html">Workout</a></li>
          <li><a href="nutrition.html">Nutrition</a></li>
          <li><a href="sleep.html">Sleep</a></li>
          <li><a href="profile.html">Profile</a></li>
        </ul>
      </nav>
    </aside>

    <div class="content">
      <header>
        <div class="ux-hero">
          <h1 id="dashboardHeaderTitle">Today</h1>
          <p class="muted" id="dashboardHeaderSubtitle">Your daily consistency at a glance.</p>
        </div>
      </header>

      <main>
        <div class="dashboard-grid">
          <section class="card col-12 mvp-score-card">
            <h2>Health score</h2>
            <p class="mvp-score-value"><strong id="dashboardHealthScore">—</strong></p>
            <p class="muted" id="dashboardHealthMeta">Log workout, nutrition, and sleep to build your score.</p>
          </section>

          <section class="card col-12" id="dashboardPlanCard">
            <h2>Today's workout</h2>
            <p class="mvp-card-value" id="dashboardPlanLabel">Loading…</p>
            <p class="muted" id="dashboardPlanMeta"></p>
            <span class="hidden" id="dashboardPlanBadge" data-source="none"></span>
          </section>

          <section class="card col-6">
            <h3>Nutrition</h3>
            <p class="mvp-card-value" id="dashboardNutritionSummary">Not logged today</p>
            <a class="pill ux-primary-cta" href="nutrition.html">Log food</a>
          </section>

          <section class="card col-6">
            <h3>Sleep</h3>
            <p class="mvp-card-value" id="dashboardSleepSummary">Not logged today</p>
            <a class="pill ux-primary-cta" href="sleep.html">Log sleep</a>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module" src="chatbot-widget.js"></script>
</body>

</html>
