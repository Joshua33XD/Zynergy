<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nutrition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="chatbot-widget.css">
  <link rel="stylesheet" href="nutrition.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h2 class="brand">ZYNERGY</h2>
      <nav class="side-nav">
        <ul>
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="workouts.html">Workout</a></li>
          <li><a href="nutrition.html" aria-current="page">Nutrition</a></li>
          <li><a href="sleep.html">Sleep</a></li>
          <li><a href="profile.html">Profile</a></li>
        </ul>
      </nav>
    </aside>

    <div class="content">
      <header>
        <div class="ux-hero">
          <h1>Nutrition</h1>
          <p class="muted">Log food quickly.</p>
        </div>
      </header>

      <main>
        <div class="dashboard-grid">
          <section class="card col-8" id="wgerNutritionCard">
            <h2>Log food</h2>
            <p class="muted" id="nutritionSaveStatus"></p>

            <div class="nutrition-form">
              <div class="form-row">
                <label for="mvpFoodName">Food</label>
                <input type="text" id="mvpFoodName" placeholder="e.g. Chicken rice bowl" autocomplete="off">
              </div>

              <div class="dual-row">
                <div class="form-row">
                  <label for="mvpProteinG">Protein (g)</label>
                  <input type="number" id="mvpProteinG" min="0" step="1" placeholder="40">
                </div>
                <div class="form-row">
                  <label for="mvpCalories">Calories</label>
                  <input type="number" id="mvpCalories" min="0" step="1" placeholder="500">
                </div>
              </div>

              <div class="form-row">
                <label for="wgerMealType">Meal type</label>
                <select id="wgerMealType">
                  <option value="breakfast">Breakfast</option>
                  <option value="lunch">Lunch</option>
                  <option value="dinner">Dinner</option>
                  <option value="snacks">Snack</option>
                </select>
              </div>

              <div class="goal-list">
                <label><input type="checkbox" id="mvpProteinGoal">Protein goal met</label>
              </div>

              <div class="action-row">
                <button id="wgerNutritionSaveBtn" type="button" class="ux-primary-cta">Save</button>
              </div>
            </div>

            <p class="hidden" id="nutritionSourceStatus"></p>
          </section>

          <section class="card col-4">
            <h3>Today</h3>
            <div class="meter-row">
              <span>Protein <strong id="proteinPct">0%</strong></span>
              <div class="meter"><span id="proteinMeter" style="width: 0%"></span></div>
            </div>
            <div class="meter-row">
              <span>Calories <strong id="caloriePct">0%</strong></span>
              <div class="meter"><span id="calorieMeter" style="width: 0%"></span></div>
            </div>
            <p class="muted" id="nutritionAvgLabel"></p>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module" src="chatbot-widget.js"></script>
</body>
</html>
