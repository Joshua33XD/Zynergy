<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sleep</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="chatbot-widget.css">
  <link rel="stylesheet" href="sleep.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h2 class="brand">ZYNERGY</h2>
      <nav class="side-nav">
        <ul>
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="workouts.html">Workout</a></li>
          <li><a href="nutrition.html">Nutrition</a></li>
          <li><a href="sleep.html" aria-current="page">Sleep</a></li>
          <li><a href="profile.html">Profile</a></li>
        </ul>
      </nav>
    </aside>

    <div class="content">
      <header>
        <div class="ux-hero">
          <h1>Sleep</h1>
          <p class="muted">Log last night in a few taps.</p>
        </div>
      </header>

      <main>
        <div class="dashboard-grid">
          <section class="card col-12 sleep-form">
            <div class="form-row">
              <label for="sleepInput">Hours slept (0–10)</label>
              <input type="number" id="sleepInput" min="0" max="10" step="0.5" placeholder="7.5">
            </div>
            <div class="form-row">
              <label for="emojiSelect">Wake-up feeling</label>
              <select id="emojiSelect">
                <option value="emoji1">Sleepy</option>
                <option value="emoji2">Fresh</option>
                <option value="emoji3">Groggy</option>
                <option value="emoji4">Tired</option>
                <option value="emoji5">Energized</option>
              </select>
            </div>
            <button id="sleepSaveBtn" type="button" class="ux-primary-cta">Save</button>
            <p class="muted hidden" id="sleepStatus"></p>
            <span class="hidden" id="sleepAvgLabel"></span>
            <span class="hidden" id="sleepLateNightsLabel"></span>
            <span class="hidden" id="sleepRecoveryTierLabel"></span>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module" src="chatbot-widget.js"></script>
</body>
</html>
