<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Workout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="chatbot-widget.css">
  <link rel="stylesheet" href="workouts.css">
</head>

<body id="workout">
  <div class="app-shell">
    <aside class="sidebar">
      <h2 class="brand">ZYNERGY</h2>
      <nav class="side-nav">
        <ul>
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="workouts.html" aria-current="page">Workout</a></li>
          <li><a href="nutrition.html">Nutrition</a></li>
          <li><a href="sleep.html">Sleep</a></li>
          <li><a href="profile.html">Profile</a></li>
        </ul>
      </nav>
    </aside>

    <div class="content">
      <header>
        <div class="ux-hero">
          <h1>Workout</h1>
          <p class="muted">Log today's session in under 30 seconds.</p>
        </div>
      </header>

      <main>
        <div class="dashboard-grid">
          <section class="card col-12">
            <h2>Today's workout</h2>
            <p class="mvp-card-value" id="todayPlanLabel">Loading…</p>
            <p class="muted" id="todayPlanMeta"></p>
            <span class="hidden" id="todayPlanSourceBadge" data-source="none"></span>
          </section>

          <section class="card col-12 workout-form" id="wgerWorkoutCard">
            <h2>Log workout</h2>
            <p class="muted" id="workoutSaveStatus"></p>

            <div class="form-row">
              <label for="wgerExerciseSelect">Exercise</label>
              <select id="wgerExerciseSelect">
                <option value="">Choose exercise</option>
              </select>
            </div>

            <input type="hidden" id="wgerSets" value="1">
            <input type="hidden" id="wgerWorkoutIntensity" value="moderate">
            <select id="wgerMuscleFocus" class="hidden" aria-hidden="true">
              <option value=""></option>
            </select>

            <section class="workout-set-builder" aria-label="Workout sets">
              <div class="workout-set-head">
                <h3>Sets</h3>
                <button id="addSetBtn" type="button">+ Add set</button>
              </div>
              <div id="workoutSetList" class="workout-set-list"></div>
            </section>

            <div class="action-row">
              <button id="wgerWorkoutSaveBtn" type="button" class="ux-primary-cta">Save workout</button>
            </div>
            <p class="muted hidden" id="workoutSourceStatus"></p>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module" src="chatbot-widget.js"></script>
</body>

</html>
